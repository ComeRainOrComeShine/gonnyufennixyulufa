# Rime schema
# encoding: utf-8

schema:
  schema_id: gonnyufennixyulufa_koinese_pinyin
  name: 赣语分宜输入法（基础音）
  version: '0.1.6-sync-20260610'
  author:
    - 贛語通訊社
  description: |
    赣语分宜输入法（基础音） Rime 方案 v0.1.1。
    当前以分宜话拼音数据为主要底本，含 7000 常用字读音和通用词频词库。
    需要配合 gonnyufennixyulufa_koinese_pinyin.dict.yaml 使用。
  dependencies:
    - stroke

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator@custom_phrase
    - reverse_lookup_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - derive/(^| )jon/$1jion/
    - derive/(^| )jon/$1juon/
    - derive/(^| )qon/$1qion/
    - derive/(^| )qon/$1quon/
    - derive/(^| )xon/$1xuon/
    - derive/(^| )yon/$1yuon/
    - derive/(^| )qon/$1ton/
    - derive/(^| )jon/$1don/
    - derive/(^| )zi/$1di/
    - derive/(^| )wen/$1wun/
    - derive/(^| )weng/$1wung/
    - derive/(^| )yiu/$1you/
    - derive/(^| )yen/$1ien/
    - derive/(^| )yiung/$1yng/
    - derive/(^| )([bcdfghjklmnpqstxz]|ng)iung/$1$2yng/
    - derive/(^| )([bcdfghjklmnpqstxz]|ng)yu/$1$2y/
    - derive/(^| )([jqx])yu/$1$2iy/
    - derive/(^| )([bcdfghjklmnpqstxz]|ng)yue/$1$2ye/
    - derive/(^| )([bcdfghjklmnpqstxz]|ng)yun/$1$2yn/
    - derive/(^| )([bcdfghjklmnpqstxz]|ng)yuon/$1$2yon/
    - derive/(^| )([bcdfghjklmnpqstxz]|ng)yui/$1$2yi/
    - derive/(^| )([bcdfghjklmnpqstxz]|ng)yuei/$1$2yei/
    - derive/(^| )y/$1iy/
    - derive/y/v/
    - derive/(^| )u/$1w/
    - derive/ui/wi/
    - derive/ui/vi/
    - derive/ui/uei/

translator:
  dictionary: gonnyufennixyulufa_koinese_pinyin

custom_phrase:
  dictionary: ""
  user_dict: custom_phrase_gonnyufennixyulufa_koinese_pinyin
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 1

reverse_lookup:
  dictionary: stroke
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: 〔筆畫〕
  preedit_format:
    - xlit/hspnz/一丨丿丶乙/
  comment_format:
    - xform/([nl])v/$1ü/

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    punct: '^/([0-9]0?|[A-Za-z]+)$'
    reverse_lookup: "`[a-z]*'?$"

__patch:
  # 使用八股文語言模型
  - grammar:/hant?
