    - derive/(^| )we/$1ue/
    - derive/(^| )wai/$1uai/
    - derive/(^| )woi/$1uoi/
    - derive/(^| )wei/$1uei/
    - derive/(^| )wan/$1uan/
    - derive/(^| )won/$1uon/
    - derive/(^| )won/$1uoin/
    - derive/(^| )won/$1woin/
    - derive/(^| )wen/$1uen/
    - derive/(^| )wang/$1uang/
    - derive/(^| )wong/$1uong/
    - derive/(^| )yng/$1yong/
    - derive/(^| )ngau/$1ngao/
    - derive/(^| )ngon/$1ngoin/
